groups:
  - name: service.rules
    rules:

      - alert: HighErrorRate
        expr: |
          (
            rate(node_network_receive_errs_total[5m])
            /
            (rate(node_network_receive_packets_total[5m]) + 1)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected on {{ $labels.instance }}"
          description: >
            Instance {{ $labels.instance }} has an error rate of
            {{ printf \"%.2f\" $value }} (threshold: 5%) for more than 5 minutes.

      - alert: HighCpuUsage
        expr: |
          100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: >
            Instance {{ $labels.instance }} is using {{ printf \"%.1f\" $value }}%
            CPU for more than 5 minutes.

      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} is down"
          description: >
            Job {{ $labels.job }} — target {{ $labels.instance }}
            has been unreachable for more than 1 minute.
