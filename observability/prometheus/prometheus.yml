global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local
    platform: ravon

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: app
    static_configs:
      - targets: ["mock-app:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "payments-service"

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
