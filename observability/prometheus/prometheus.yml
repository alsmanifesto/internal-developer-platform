global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local
    platform: ravon

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: fake-metrics
    static_configs:
      - targets: ["fake-metrics:8081"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
